name: Windows 10 VM - DIRECT RDP ONLY (Bore - Free)

on:
  workflow_dispatch:

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bore (Using GitHub API - Most Reliable)
        run: |
          echo "Installing Bore (free TCP tunnel)..."
          
          # Get latest release info from GitHub API
          BORE_URL=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest \
            | grep -o '"browser_download_url": "[^"]*x86_64-unknown-linux-musl.tar.gz"' \
            | cut -d'"' -f4 | head -1)
          
          if [ -z "$BORE_URL" ]; then
            echo "❌ Could not find Bore download URL from GitHub API"
            exit 1
          fi
          
          echo "Downloading from: $BORE_URL"
          
          # Download
          curl -L --fail --retry 3 -o /tmp/bore.tar.gz "$BORE_URL"
          
          # Check what we got
          echo "Downloaded file:"
          file /tmp/bore.tar.gz
          
          # Extract and install
          tar -xzf /tmp/bore.tar.gz -C /tmp
          sudo mv /tmp/bore /usr/local/bin/bore
          sudo chmod +x /usr/local/bin/bore
          
          bore --version
          echo "✅ Bore installed successfully"

      - name: Start Windows 10 Container
        run: |
          docker rm -f win10-rdp 2>/dev/null || true

          docker run -d --name win10-rdp \
            --device /dev/kvm \
            -p 3389:3389 \
            -e VERSION="win10" \
            -e USERNAME="RDP" \
            -e PASSWORD="RdpPass123!" \
            -e DISK_SIZE="100G" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="4" \
            -e DISABLE_WEB="true" \
            dockurr/windows

          echo "✅ Container started"
          sleep 25

      - name: Start Bore TCP Tunnel (Free)
        run: |
          echo "🚀 Starting free Bore TCP tunnel for RDP..."

          rm -f /tmp/bore.log

          nohup bore local 3389 --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!

          echo "bore started (PID: $BORE_PID)"
          echo "Waiting for public address (up to 120 seconds)..."

          RDP_HOST=""
          for i in {1..60}; do
            sleep 2

            if [ -f /tmp/bore.log ]; then
              RDP_HOST=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1)
            fi

            if [ -n "$RDP_HOST" ]; then
              echo "✅ Got Bore address: $RDP_HOST"
              break
            fi
          done

          echo ""
          echo "=== Full Bore log ==="
          cat /tmp/bore.log || echo "(log empty)"
          echo "====================="

          if [ -z "$RDP_HOST" ]; then
            echo "❌ Failed to get Bore address"
            echo ""
            echo "=== bore processes ==="
            ps aux | grep -E '[b]ore' || true
            exit 1
          fi

          echo "RDP_HOST=$RDP_HOST" >> $GITHUB_ENV

          echo ""
          echo "✅ Free Bore tunnel ready!"
          echo "RDP Address: $RDP_HOST"

      - name: Wait for Windows to Boot
        run: |
          echo "⏳ Waiting for Windows to boot (15-25 mins first run)..."
          sleep 300
          echo "Boot wait finished"

      - name: Show DIRECT RDP Details
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "           ✅ DIRECT RDP READY (Free - No Web)"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🔗 Computer:"
          echo "   ${{ env.RDP_HOST }}"
          echo ""
          echo "👤 Username: RDP"
          echo "🔑 Password: RdpPass123!"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Pure direct RDP using Bore (free, no card, no Tailscale)"

      - name: Keep VM Running
        run: |
          while true; do
            echo "[$(date '+%H:%M:%S')] RDP Active → ${{ env.RDP_HOST }}"
            sleep 300
          done
