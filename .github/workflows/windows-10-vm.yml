name: Windows 10 VM - DIRECT RDP ONLY (No Web)

on:
  workflow_dispatch:

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ngrok (Direct Binary)
        run: |
          echo "Installing ngrok..."
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          sudo mv ngrok /usr/local/bin/
          ngrok version
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
          echo "✅ ngrok installed"

      - name: Start Windows 10 Container
        run: |
          docker rm -f win10-rdp 2>/dev/null || true

          docker run -d --name win10-rdp \
            --device /dev/kvm \
            -p 3389:3389 \
            -e VERSION="win10" \
            -e USERNAME="RDP" \
            -e PASSWORD="RdpPass123!" \
            -e DISK_SIZE="100G" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="4" \
            -e DISABLE_WEB="true" \
            dockurr/windows

          echo "✅ Container started"
          sleep 15

      - name: Start ngrok TCP Tunnel (Very Robust)
        run: |
          echo "🚀 Starting ngrok TCP tunnel for RDP..."

          rm -f /tmp/ngrok.log

          nohup ngrok tcp 3389 \
            --authtoken ${{ secrets.NGROK_AUTHTOKEN }} \
            --log=stdout \
            --region=us > /tmp/ngrok.log 2>&1 &

          NGROK_PID=$!
          echo "ngrok started with PID: $NGROK_PID"

          echo "Waiting for ngrok API (up to 120 seconds)..."

          NGROK_READY=false
          for i in {1..60}; do
            sleep 2

            if ! ps -p $NGROK_PID > /dev/null 2>&1; then
              echo "ngrok process died at attempt $i"
              break
            fi

            if curl -s --max-time 5 http://127.0.0.1:4040/api/tunnels >/dev/null 2>&1; then
              NGROK_READY=true
              echo "✅ ngrok API is ready after $((i*2)) seconds"
              break
            fi
          done

          if [ "$NGROK_READY" = false ]; then
            echo "❌ ngrok tunnel failed to start"
            echo ""
            echo "=== ngrok log (last 150 lines) ==="
            tail -n 150 /tmp/ngrok.log || echo "No log file"
            echo ""
            echo "=== ngrok processes ==="
            ps aux | grep -E '[n]grok' || true
            exit 1
          fi

          sleep 6

          echo "Fetching public RDP address..."
          TUNNELS=$(curl -s http://127.0.0.1:4040/api/tunnels)

          RDP_URL=$(echo "$TUNNELS" | jq -r '.tunnels[]? | select(.proto=="tcp") | .public_url' | head -1)

          if [ -z "$RDP_URL" ] || [ "$RDP_URL" = "null" ]; then
            RDP_URL=$(echo "$TUNNELS" | jq -r '.tunnels[0].public_url // "NOT_FOUND"')
          fi

          RDP_HOST=$(echo "$RDP_URL" | sed 's|tcp://||')

          echo "RDP_URL=$RDP_URL" >> $GITHUB_ENV
          echo "RDP_HOST=$RDP_HOST" >> $GITHUB_ENV

          echo ""
          echo "✅ ngrok tunnel created successfully!"
          echo "RDP Host: $RDP_HOST"

      - name: Wait for Windows to Boot
        run: |
          echo "⏳ Waiting for Windows to boot (15-25 mins on first run)..."
          sleep 300
          echo "Boot wait finished"

      - name: Show DIRECT RDP Details
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "           ✅ DIRECT RDP READY (No Web)"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🔗 Computer:"
          echo "   ${{ env.RDP_HOST }}"
          echo ""
          echo "👤 Username: RDP"
          echo "🔑 Password: RdpPass123!"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"

      - name: Keep VM Running
        run: |
          while true; do
            echo "[$(date '+%H:%M:%S')] RDP Active → ${{ env.RDP_HOST }}"
            sleep 300
          done
