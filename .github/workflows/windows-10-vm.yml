name: Windows 10 VM - DIRECT RDP ONLY (Pinggy - Free TCP)

on:
  workflow_dispatch:

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass openssh-client jq

      - name: Start Windows 10 Container
        run: |
          docker rm -f win10-rdp 2>/dev/null || true

          docker run -d --name win10-rdp \
            --device /dev/kvm \
            -p 3389:3389 \
            -e VERSION="win10" \
            -e USERNAME="RDP" \
            -e PASSWORD="RdpPass123!" \
            -e DISK_SIZE="100G" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="4" \
            -e DISABLE_WEB="true" \
            dockurr/windows

          echo "✅ Windows container started"
          sleep 20

      - name: Start Pinggy TCP Tunnel (Free - No Card Needed)
        run: |
          echo "🚀 Starting free Pinggy TCP tunnel for RDP..."

          pkill -f "tcp@free.pinggy.io" || true

          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 \
            -R 0:localhost:3389 tcp@free.pinggy.io > /tmp/pinggy.log 2>&1 &

          SSH_PID=$!
          echo "Pinggy SSH process started"

          echo "Waiting for Pinggy to give us the public address (up to 60s)..."

          RDP_HOST=""
          for i in {1..30}; do
            sleep 2
            
            if grep -q "tcp://" /tmp/pinggy.log 2>/dev/null; then
              RDP_HOST=$(grep -o 'tcp://[^ ]*' /tmp/pinggy.log | head -1 | sed 's|tcp://||')
              if [ -n "$RDP_HOST" ]; then
                echo "✅ Got Pinggy address: $RDP_HOST"
                break
              fi
            fi
          done

          if [ -z "$RDP_HOST" ]; then
            echo "❌ Failed to get Pinggy address"
            echo "=== Pinggy log ==="
            cat /tmp/pinggy.log
            exit 1
          fi

          echo "RDP_HOST=$RDP_HOST" >> $GITHUB_ENV
          echo "RDP_URL=tcp://$RDP_HOST" >> $GITHUB_ENV

          echo ""
          echo "✅ Free TCP tunnel ready!"
          echo "RDP Address: $RDP_HOST"

      - name: Wait for Windows to Boot
        run: |
          echo "⏳ Waiting for Windows to boot (15-25 mins first run)..."
          sleep 300
          echo "Boot wait finished"

      - name: Show DIRECT RDP Details
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "           ✅ DIRECT RDP READY (Free - No Web)"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🔗 Computer:"
          echo "   ${{ env.RDP_HOST }}"
          echo ""
          echo "👤 Username: RDP"
          echo "🔑 Password: RdpPass123!"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "This uses Pinggy (free TCP tunnel) - no card required"

      - name: Keep VM Running
        run: |
          while true; do
            echo "[$(date '+%H:%M:%S')] RDP Active → ${{ env.RDP_HOST }}"
            sleep 300
          done
