name: Windows 10 VM - DIRECT RDP ONLY (No Web)

on:
  workflow_dispatch:

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update -qq
          sudo apt install -y -qq ngrok jq
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Start Windows 10 with DIRECT RDP
        run: |
          docker rm -f win10-rdp 2>/dev/null || true

          # dockurr/windows - Best for direct RDP performance
          docker run -d --name win10-rdp \
            --device /dev/kvm \
            -p 3389:3389 \
            -e VERSION="win10" \
            -e USERNAME="RDP" \
            -e PASSWORD="RdpPass123!" \
            -e DISK_SIZE="100G" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="4" \
            -e DISABLE_WEB="true" \
            dockurr/windows

          echo "✅ Windows 10 started with direct RDP only"
          sleep 25

      - name: Start ngrok RDP Tunnel Only
        run: |
          echo "Starting ngrok TCP tunnel for RDP only..."

          ngrok tcp 3389 \
            --log=stdout \
            --region=us > /tmp/ngrok-rdp.log 2>&1 &

          sleep 8

          for i in {1..25}; do
            if curl -s http://127.0.0.1:4040/api/tunnels > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          TUNNELS=$(curl -s http://127.0.0.1:4040/api/tunnels)
          RDP_URL=$(echo "$TUNNELS" | jq -r '.tunnels[]? | select(.proto=="tcp") | .public_url' | head -1)

          if [ -z "$RDP_URL" ] || [ "$RDP_URL" = "null" ]; then
            RDP_URL=$(echo "$TUNNELS" | jq -r '.tunnels[0].public_url // "NOT_FOUND"')
          fi

          RDP_HOST=$(echo "$RDP_URL" | sed 's|tcp://||')

          echo "RDP_URL=$RDP_URL" >> $GITHUB_ENV
          echo "RDP_HOST=$RDP_HOST" >> $GITHUB_ENV

          echo "✅ RDP Tunnel ready"
          echo "RDP: $RDP_URL"

      - name: Wait for Windows Boot
        run: |
          echo "Waiting for Windows to boot (15-30 mins first time)..."
          sleep 180   # Give Windows time to boot properly
          echo "Windows should be ready for direct RDP now"

      - name: Show DIRECT RDP Details (No Web)
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "           ✅ FULLY READY - DIRECT RDP ONLY"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🔗 RDP COMPUTER / HOST:"
          echo "   ${{ env.RDP_HOST }}"
          echo ""
          echo "👤 USERNAME:"
          echo "   RDP"
          echo ""
          echo "🔑 PASSWORD:"
          echo "   RdpPass123!"
          echo ""
          echo "───────────────────────────────────────────────────────────────"
          echo "📌 HOW TO CONNECT (Direct RDP - No Web):"
          echo ""
          echo "   Windows:"
          echo "     1. Open 'Remote Desktop Connection'"
          echo "     2. Paste exactly: ${{ env.RDP_HOST }}"
          echo "     3. Username: RDP"
          echo "     4. Password: RdpPass123!"
          echo "     5. Click Connect"
          echo ""
          echo "   Mac / Android / iPhone:"
          echo "     Use Microsoft Remote Desktop app"
          echo "     Paste the address above"
          echo ""
          echo "───────────────────────────────────────────────────────────────"
          echo "⚠️  First run only: May take 15-30 minutes to boot"
          echo "   After first setup, RDP connects very fast"
          echo ""
          echo "💡 This is PURE RDP - no web interface used"
          echo "═══════════════════════════════════════════════════════════════"

      - name: Keep Alive
        run: |
          echo "🔄 Direct RDP Windows 10 is running"
          while true; do
            echo "[$(date '+%H:%M:%S')] RDP Active: ${{ env.RDP_HOST }}"
            sleep 300
          done
